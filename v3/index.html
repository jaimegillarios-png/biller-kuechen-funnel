<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>biller küchen · Küchenplaner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F4F1EB;
      --bg-2: #ECE7DD;
      --paper: #FBFAF7;
      --paper-2: #FFFFFF;
      --ink: #1A1D1B;
      --ink-2: #383C39;
      --ink-3: #6E726F;
      --ink-4: #A8ABA7;
      --line: rgba(26, 29, 27, 0.10);
      --line-2: rgba(26, 29, 27, 0.16);
      --accent: oklch(58% 0.07 150);
      --accent-soft: oklch(95% 0.02 150);
      --radius: 14px;
      --shadow-card: 0 1px 0 rgba(26,29,27,0.04), 0 12px 40px -16px rgba(26,29,27,0.12);
      --t: 220ms cubic-bezier(.2,.7,.2,1);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.55;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "ss01", "cv11";
    }
    button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
    input, select { font-family: inherit; color: inherit; }
    a { color: var(--ink-2); }

    .page {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 0 32px 48px;
      background:
        radial-gradient(1400px 700px at 50% -240px, rgba(26,29,27,0.06), transparent 60%),
        var(--bg);
    }

    .card {
      width: 100%;
      max-width: 1180px;
      background: var(--paper);
      border-radius: 0 0 24px 24px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      position: relative;
    }
    .card-body {
      padding: 14px 48px 56px;
      min-height: 760px;
      display: flex; flex-direction: column;
    }

    /* review bar — full-width banner pinned to the very top of the page */
    .review-bar {
      width: 100%;
      background: oklch(28% 0.05 150);
      color: #FBFAF7;
      font-size: 13px;
      letter-spacing: 0.005em;
    }
    .review-bar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 6px 32px;
      display: flex; align-items: center;
      gap: 18px;
    }
    .review-cluster { display: flex; align-items: center; gap: 14px; }
    .review-divider {
      width: 1px; height: 16px;
      background: rgba(255,255,255,0.16);
      flex-shrink: 0;
    }
    .review-rating { display: flex; align-items: center; gap: 8px; }
    .review-rating strong {
      font-weight: 700; font-size: 14px;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }
    .stars { display: inline-flex; gap: 2px; color: #F1C84B; }
    .review-source {
      display: inline-flex; align-items: center; gap: 8px;
      color: rgba(251,250,247,0.82);
    }
    .review-source-text { font-weight: 500; }
    .review-trust {
      margin-left: auto; display: inline-flex; align-items: center; gap: 8px;
      font-size: 12.5px;
      color: rgba(251,250,247,0.86);
      padding: 5px 10px 5px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: oklch(70% 0.15 150);
      box-shadow: 0 0 0 4px oklch(70% 0.15 150 / 0.18);
      animation: pulse-dot 2.4s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 4px oklch(70% 0.15 150 / 0.18); }
      50%      { box-shadow: 0 0 0 6px oklch(70% 0.15 150 / 0.10); }
    }

    /* nav */
    .nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 0 16px;
    }
    .nav .back-btn { justify-self: start; }
    .nav .brand    { justify-self: center; }
    .nav .step-counter { justify-self: end; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 16px; color: var(--ink-2);
      padding: 10px 14px; margin-left: -14px;
      border-radius: 10px;
      transition: var(--t);
    }
    .back-btn svg { width: 18px; height: 18px; }
    .back-btn:hover:not(:disabled) { background: var(--bg-2); color: var(--ink); }
    .back-btn:disabled { opacity: 0; pointer-events: none; }
    .brand { display: inline-flex; align-items: center; }
    .brand img { display: block; height: 64px; width: auto; }
    .step-counter {
      font-variant-numeric: tabular-nums;
      font-size: 15px; color: var(--ink-3); letter-spacing: 0.04em;
    }
    .step-counter .step-num { color: var(--ink); font-weight: 600; }
    .step-counter .step-sep { margin: 0 2px; color: var(--ink-4); }

    /* progress */
    .progress {
      position: relative; width: 100%; height: 3px;
      margin-bottom: 28px; border-radius: 2px; overflow: hidden;
    }
    .progress-track { position: absolute; inset: 0; background: var(--line); }
    .progress-fill {
      position: absolute; inset: 0 auto 0 0;
      background: var(--accent);
      border-radius: 2px;
      transition: width 480ms cubic-bezier(.2,.7,.2,1);
    }

    /* step */
    .step-content { flex: 1; display: flex; flex-direction: column; animation: fadeUp 320ms cubic-bezier(.2,.7,.2,1); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .header { margin-bottom: 28px; text-align: center; }
    .title {
      font-family: 'Inter', sans-serif;
      font-weight: 500; font-size: 32px; line-height: 1.14;
      letter-spacing: -0.02em; margin: 0 0 14px;
      color: var(--ink); text-wrap: balance;
    }
    .subtitle { margin: 0; font-size: 16px; color: var(--ink-3); text-wrap: pretty; }

    /* grid */
    .grid { display: grid; gap: 20px; grid-template-columns: repeat(var(--cols), minmax(0, 1fr)); }
    .grid-cols-2 { --cols: 2; max-width: 720px; margin: 0 auto; width: 100%; }
    .grid-cols-3 { --cols: 3; }
    .grid-cols-4 { --cols: 4; }
    .grid-cols-5 { --cols: 5; }

    .opt-card {
      position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px;
      padding: 16px 16px 18px;
      background: var(--paper-2);
      border: 1.5px solid var(--line);
      border-radius: 16px;
      text-align: center;
      transition: transform var(--t), border-color var(--t), box-shadow var(--t), background var(--t);
      isolation: isolate;
    }
    .opt-card:hover {
      border-color: var(--line-2);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px -10px rgba(26,29,27,0.14);
    }
    .opt-card.is-selected {
      border-color: var(--accent);
      background: var(--paper-2);
      box-shadow: 0 0 0 3px var(--accent-soft), 0 14px 32px -14px oklch(58% 0.07 150 / 0.40);
    }
    .opt-glyph {
      display: block; width: 100%;
      max-width: 200px;
      margin: 0 auto;
      border-radius: 10px;
      background: #ffffff;
      color: var(--ink);
      overflow: hidden;
      aspect-ratio: 4/3;
      padding: 0; position: relative;
    }
    .opt-glyph .shape-svg { display: block; width: 100%; height: 100%; }
    .opt-glyph .iso-stage { padding: 6px; }
    .opt-glyph .opt-bitmap {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      padding: 22px;
    }
    .opt-glyph .opt-bitmap > svg {
      display: block;
      max-width: 100%; max-height: 100%;
      width: auto; height: auto;
    }
    /* Thicken the line work in the supplied SVGs. The icon files draw
       outlines as thin filled shapes (.cls-1) with stroke-width:0; layering
       a stroke on top widens the perceived line. */
    .opt-glyph .opt-bitmap > svg .cls-1 {
      stroke: #3F4644;
      stroke-width: 1.15;
      stroke-linejoin: round;
      stroke-linecap: round;
      fill: #3F4644;
    }
    /* Unify icon line color across all glyph variants — inline iso SVGs,
       supplied SVG files, and budget illustrations. Targets every common
       way "black" is encoded in the source markup. */
    .opt-glyph svg [fill="black"],
    .opt-glyph svg [fill="#000"],
    .opt-glyph svg [fill="#000000"],
    .opt-glyph svg [fill="#1A1D1B"],
    .opt-glyph svg [fill="#1a1d1b"] {
      fill: #3F4644;
    }
    .opt-glyph svg [stroke="black"],
    .opt-glyph svg [stroke="#000"],
    .opt-glyph svg [stroke="#000000"],
    .opt-glyph svg [stroke="#1A1D1B"],
    .opt-glyph svg [stroke="#1a1d1b"] {
      stroke: #3F4644;
    }
    .opt-meta { display: flex; flex-direction: column; gap: 2px; align-items: center; text-align: center; width: 100%; }
    .opt-label { display: block; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); }
    .opt-hint { display: block; font-size: 13px; color: var(--ink-3); }

    .opt-check {
      position: absolute;
      top: 12px; right: 12px;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--ink-4);
      border: 1.5px solid transparent;
      color: white;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(.6); transition: var(--t);
      z-index: 2;
    }
    .opt-card.is-selected .opt-check {
      opacity: 1; transform: scale(1);
      background: var(--accent); border-color: var(--accent); color: white;
    }

    /* fallback */
    .fallback {
      margin-top: 22px; width: 100%;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1.5px dashed var(--line-2);
      background: transparent;
      color: var(--ink-2);
      font-weight: 500; font-size: 14px;
      transition: var(--t);
    }
    .fallback:hover { background: var(--bg-2); border-style: solid; }
    .fallback.is-selected {
      border-color: var(--accent); border-style: solid;
      background: var(--accent-soft); color: var(--ink);
    }

    /* form */
    .form-step { display: flex; flex-direction: column; gap: 20px; max-width: 480px; margin: 0 auto; width: 100%; }
    .anrede {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    }
    .anrede-opt {
      padding: 10px 12px; border-radius: 999px;
      border: 1.5px solid var(--line);
      background: var(--paper-2);
      font-size: 14px; font-weight: 500; color: var(--ink-2);
      transition: var(--t);
    }
    .anrede-opt:hover { border-color: var(--line-2); }
    .anrede-opt.is-selected {
      border-color: var(--accent); background: var(--accent-soft); color: var(--ink);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; grid-column: 1 / -1; }
    .field-half { grid-column: span 1; }
    .field-label { font-size: 13px; color: var(--ink-2); font-weight: 500; }
    .input {
      width: 100%; padding: 14px 16px;
      border-radius: 10px; border: 1.5px solid var(--line);
      background: var(--paper-2); font-size: 15px; color: var(--ink);
      outline: none; transition: var(--t);
    }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .field.has-error .input { border-color: oklch(58% 0.16 25); }
    .field-err { font-size: 12px; color: oklch(50% 0.16 25); }

    .phone-row { display: grid; grid-template-columns: 120px 1fr; gap: 8px; align-items: stretch; }
    .phone-country {
      width: 100%;
      padding: 14px 12px;
      border-radius: 10px; border: 1.5px solid var(--line);
      background: var(--paper-2); font-size: 15px; color: var(--ink);
      outline: none; transition: var(--t);
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%236E726F' d='M0 0h10L5 6z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 12px center;
      padding-right: 28px;
    }
    .phone-country:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

    .form-cta {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      padding: 16px 22px;
      background: var(--ink); color: var(--paper);
      border-radius: 12px;
      font-size: 15px; font-weight: 500;
      transition: var(--t);
      box-shadow: 0 6px 18px -8px rgba(26,29,27,0.4);
      width: 100%;
    }
    .form-cta:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px -10px rgba(26,29,27,0.45);
    }
    .form-cta:disabled { background: var(--ink-4); cursor: not-allowed; box-shadow: none; }

    .ssl-pill {
      display: inline-flex; align-items: center; gap: 6px;
      align-self: center;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--bg-2);
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--ink-3);
      text-transform: uppercase;
    }
    .legal {
      font-size: 12px; line-height: 1.55;
      color: var(--ink-3);
      text-align: center;
    }
    .legal a { color: var(--ink-2); text-decoration: underline; text-underline-offset: 2px; }

    /* CTA row (form only) */
    .cta-row {
      margin-top: 8px;
      display: flex; flex-direction: column; gap: 10px; align-items: stretch;
    }

    /* success */
    .success {
      display: flex; flex-direction: column; align-items: center; text-align: center;
      padding: 24px 0;
      animation: fadeUp 360ms cubic-bezier(.2,.7,.2,1);
    }
    .success-icon {
      margin-bottom: 18px; background: var(--accent-soft);
      width: 72px; height: 72px; border-radius: 50%;
      display: grid; place-items: center;
    }
    .success-title { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 30px; letter-spacing: -0.02em; margin: 0 0 8px; }
    .success-sub { margin: 0 0 32px; color: var(--ink-3); max-width: 480px; }
    .success-summary {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      width: 100%; max-width: 640px;
    }
    .success-summary > div {
      padding: 14px; border-radius: 12px; background: var(--bg-2);
      display: flex; flex-direction: column; gap: 4px; text-align: left;
    }
    .success-summary span { font-size: 12px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; }
    .success-summary strong { font-size: 14px; font-weight: 600; color: var(--ink); }

    /* brand strip */
    .brand-strip {
      border-top: 1px solid var(--line);
      padding: 18px 80px;
      display: flex; align-items: center; gap: 28px;
      background: var(--paper);
    }
    .brand-strip-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-4); white-space: nowrap; }
    .brand-list { flex: 1; display: flex; align-items: center; justify-content: space-around; gap: 18px; flex-wrap: wrap; }
    .brand-item {
      font-family: 'Inter', sans-serif;
      font-weight: 500; font-size: 14px; letter-spacing: 0.04em;
      color: var(--ink-3); opacity: 0.85;
      transition: var(--t);
    }

    /* reassurance strip — sits flush at the bottom of the card */
    .reassure {
      margin: 0;
      width: 100%;
      display: grid; grid-template-columns: repeat(3, 1fr);
      background: transparent;
      border: 0;
      border-top: 1px solid var(--line);
      border-radius: 0;
      padding: 0 48px;
      box-shadow: none;
    }
    .reassure-item {
      position: relative;
      display: flex; align-items: center; justify-content: center; gap: 14px;
      padding: 26px 22px;
      transition: background var(--t);
      border-radius: 14px;
    }
    .reassure-item:not(:last-child)::after {
      content: "";
      position: absolute; right: 0; top: 22%; bottom: 22%;
      width: 1px; background: var(--line);
    }
    .reassure-icon {
      flex-shrink: 0;
      width: 36px; height: 36px;
      border-radius: 50%;
      display: grid; place-items: center;
      background: var(--accent-soft);
      color: var(--accent);
    }
    .reassure-t {
      font-size: 15px; font-weight: 600; color: var(--ink);
      letter-spacing: -0.01em;
    }
    .reassure-s { font-size: 13px; color: var(--ink-3); margin-top: 1px; }

    /* responsive */
    @media (max-width: 1100px) {
      .card-body { padding: 30px 48px 36px; }
    }
    @media (max-width: 880px) {
      .page { padding: 0; }
      .card {
        border-radius: 0;
        border: 0;
        box-shadow: none;
        max-width: none;
      }
      .card-body { padding: 16px 18px 24px; min-height: calc(100vh - 200px); }
      .nav { padding: 4px 0 10px; }
      .progress { margin-bottom: 24px; }
      .header { margin-bottom: 24px; }
      .title { margin-bottom: 8px; }
      .grid { gap: 10px; }
      .fallback { margin-top: 12px; }
      .reassure {
        margin: 0; max-width: none;
        border-radius: 0;
        border-left: 0; border-right: 0;
        box-shadow: none;
        padding: 0 18px;
      }
      .grid-cols-5 { grid-template-columns: repeat(2, 1fr); }
      .grid-cols-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-cols-3 { grid-template-columns: repeat(2, 1fr); }
      .title { font-size: 26px; }
      .review-trust { display: none; }
      .brand img { height: 52px; }
      .brand-strip { padding: 14px 18px; gap: 12px; }
      .brand-strip-label { display: none; }
      .form-grid { grid-template-columns: 1fr; }
      .field-half { grid-column: 1 / -1; }
      .anrede { grid-template-columns: repeat(2, 1fr); }
      .success-summary { grid-template-columns: repeat(2, 1fr); }
      .reassure { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo } = React;
    // Convert base64 data URI -> blob URL. Some preview sandboxes block
    // data: URIs in img-src via CSP but allow blob: URIs.
    const LOGO_URI = (() => {
      try {
        const b64 = window.LOGO_URI.split(',', 2)[1];
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        return URL.createObjectURL(new Blob([bytes], { type: 'image/png' }));
      } catch (e) {
        return window.LOGO_URI;
      }
    })();
    const _toBlobURL = (src) => {
      try {
        const m = /^data:([^;]+);base64,(.*)$/.exec(src);
        const mime = m ? m[1] : 'image/png';
        const b64  = m ? m[2] : src.split(',', 2)[1];
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        return URL.createObjectURL(new Blob([bytes], { type: mime }));
      } catch (e) { return src; }
    };
    const STUDIO_URI = _toBlobURL(window.STUDIO_URI);
    const HOME_URI = _toBlobURL(window.HOME_URI);

    // ─────────────────────────── isometric helpers ───────────────────────────
    const ISO = { cos: Math.cos(Math.PI / 6), sin: Math.sin(Math.PI / 6) };
    const iso = (x, y, z = 0) => [(x - y) * ISO.cos, (x + y) * ISO.sin - z];
    const pt = (p) => `${p[0].toFixed(2)},${p[1].toFixed(2)}`;

    function IsoBlock({ x, y, z = 0, w, d, h, top = "#fff", front = "#fff", side = "#fff", stroke = "#1A1D1B", strokeWidth = 0.5 }) {
      const A = iso(x,y,z), B = iso(x+w,y,z), C = iso(x+w,y+d,z), D = iso(x,y+d,z);
      const E = iso(x,y,z+h), F = iso(x+w,y,z+h), G = iso(x+w,y+d,z+h), H = iso(x,y+d,z+h);
      return (
        <g>
          <polygon points={`${pt(E)} ${pt(F)} ${pt(G)} ${pt(H)}`} fill={top} stroke={stroke} strokeWidth={strokeWidth} strokeLinejoin="round" />
          <polygon points={`${pt(H)} ${pt(G)} ${pt(C)} ${pt(D)}`} fill={front} stroke={stroke} strokeWidth={strokeWidth} strokeLinejoin="round" />
          <polygon points={`${pt(F)} ${pt(B)} ${pt(C)} ${pt(G)}`} fill={side} stroke={stroke} strokeWidth={strokeWidth} strokeLinejoin="round" />
        </g>
      );
    }

    function MergedRun({ outline, h, fill = "#fff", stroke = "#1A1D1B", strokeWidth = 0.5 }) {
      const edges = []; const N = outline.length;
      for (let i = 0; i < N; i++) {
        const a = outline[i], b = outline[(i + 1) % N];
        const dx = b[0] - a[0], dy = b[1] - a[1];
        const nx = dy, ny = -dx;
        edges.push({ a, b, visible: nx > 0.0001 || ny > 0.0001 });
      }
      const topPts = outline.map(([x, y]) => iso(x, y, h));
      return (
        <g>
          {edges.filter(e => e.visible).map((e, i) => {
            const aT = iso(e.a[0], e.a[1], h), bT = iso(e.b[0], e.b[1], h);
            const aB = iso(e.a[0], e.a[1], 0), bB = iso(e.b[0], e.b[1], 0);
            return <polygon key={i} points={`${pt(aT)} ${pt(bT)} ${pt(bB)} ${pt(aB)}`} fill={fill} stroke="none" />;
          })}
          {edges.filter(e => e.visible).map((e, i) => {
            const aB = iso(e.a[0], e.a[1], 0), bB = iso(e.b[0], e.b[1], 0);
            return <line key={i} x1={aB[0]} y1={aB[1]} x2={bB[0]} y2={bB[1]} stroke={stroke} strokeWidth={strokeWidth} strokeLinecap="round" />;
          })}
          {(() => {
            const lines = [];
            for (let i = 0; i < N; i++) {
              const prev = edges[(i - 1 + N) % N], next = edges[i];
              if (prev.visible !== next.visible) {
                const v = outline[i];
                const top = iso(v[0], v[1], h), bot = iso(v[0], v[1], 0);
                lines.push(<line key={`v${i}`} x1={top[0]} y1={top[1]} x2={bot[0]} y2={bot[1]} stroke={stroke} strokeWidth={strokeWidth} strokeLinecap="round" />);
              } else if (prev.visible && next.visible) {
                const dpx = prev.b[0] - prev.a[0], dpy = prev.b[1] - prev.a[1];
                const dnx = next.b[0] - next.a[0], dny = next.b[1] - next.a[1];
                const cross = dpx * dny - dpy * dnx;
                if (cross >= -0.0001) {
                  const v = outline[i];
                  const top = iso(v[0], v[1], h), bot = iso(v[0], v[1], 0);
                  lines.push(<line key={`v${i}`} x1={top[0]} y1={top[1]} x2={bot[0]} y2={bot[1]} stroke={stroke} strokeWidth={strokeWidth} strokeLinecap="round" />);
                }
              }
            }
            return lines;
          })()}
          <polygon points={topPts.map(pt).join(" ")} fill={fill} stroke={stroke} strokeWidth={strokeWidth} strokeLinejoin="round" />
        </g>
      );
    }

    function Sink({ x, y, z }) {
      const w = 2.4, d = 1.6;
      const c1 = iso(x, y, z), c2 = iso(x + w, y, z), c3 = iso(x + w, y + d, z), c4 = iso(x, y + d, z);
      return (
        <g fill="none" stroke="#1A1D1B" strokeWidth="0.45" strokeLinejoin="round">
          <polygon points={`${pt(c1)} ${pt(c2)} ${pt(c3)} ${pt(c4)}`} />
        </g>
      );
    }
    function Hob({ x, y, z }) {
      return (
        <g fill="none" stroke="#1A1D1B" strokeWidth="0.4">
          {[[x+0.7,y+0.7],[x+2.3,y+0.7],[x+0.7,y+2.3],[x+2.3,y+2.3]].map((b, i) => {
            const c = iso(b[0], b[1], z + 0.01);
            return <ellipse key={i} cx={c[0]} cy={c[1]} rx={0.4 * ISO.cos} ry={0.4 * ISO.sin} />;
          })}
        </g>
      );
    }
    function CabinetRun({ x, y, w, d, baseH = 6, sink, hob }) {
      return (
        <g>
          <IsoBlock x={x} y={y} w={w} d={d} h={baseH} />
          {sink && <Sink x={sink.x} y={sink.y} z={baseH} />}
          {hob  && <Hob  x={hob.x}  y={hob.y}  z={baseH} />}
        </g>
      );
    }

    function IsoStage({ children, label, viewBox = "-12.04 -11.25 44 33" }) {
      return (
        <svg viewBox={viewBox} className="shape-svg iso-stage" aria-label={label} preserveAspectRatio="xMidYMid meet">
          {children}
        </svg>
      );
    }

    // ─────────────────────────── shape icons ───────────────────────────
    const Shapes = {
      KITCHENETTE: (
        <IsoStage label="Küchenzeile" viewBox="-12.04 -11.25 44 33">
          <CabinetRun x={0} y={0} w={28} d={5} sink={{ x: 4, y: 1.5 }} hob={{ x: 12, y: 1 }} />
        </IsoStage>
      ),
      TWO_LINER: (
        <IsoStage label="Zweizeiler" viewBox="-19.84 -8.75 44 33">
          <CabinetRun x={0} y={0}  w={24} d={5} hob={{ x: 10, y: 1 }} />
          <CabinetRun x={0} y={14} w={24} d={5} sink={{ x: 8, y: 15.5 }} />
        </IsoStage>
      ),
      L_FORM: (
        <IsoStage label="L-Form" viewBox="-18.54 -11.75 44 33">
          <MergedRun outline={[[0,0],[26,0],[26,5],[5,5],[5,18],[0,18]]} h={6} />
          <Hob x={12} y={1} z={6} />
          <Sink x={1} y={8} z={6} />
        </IsoStage>
      ),
      U_FORM: (
        <IsoStage label="U-Form" viewBox="-18.54 -8.50 44 33">
          <MergedRun outline={[[0,0],[26,0],[26,18],[21,18],[21,5],[5,5],[5,18],[0,18]]} h={6} />
          <Hob x={12} y={1} z={6} />
          <Sink x={1} y={8} z={6} />
        </IsoStage>
      ),
      ISLAND: (
        <IsoStage label="Insel" viewBox="-16.80 -9.50 44 33">
          <CabinetRun x={0} y={0}  w={26} d={5} hob={{ x: 12, y: 1 }} />

      ),

    // ─────────────────────────── location icons ───────────────────────────
    // Helper — emit a rectangle on the building's +y front face (plane y = yFront).
    function FrontRect({ yFront, x1, x2, z1, z2, fill = "none", stroke = "#1A1D1B", strokeWidth = 0.5 }) {
      const a = iso(x1, yFront, z1);
      const b = iso(x2, yFront, z1);
      const c = iso(x2, yFront, z2);
      const d = iso(x1, yFront, z2);
      return <polygon points={`${pt(a)} ${pt(b)} ${pt(c)} ${pt(d)}`}
                      fill={fill} stroke={stroke} strokeWidth={strokeWidth} strokeLinejoin="round" />;
    }

    // STUDIO + HOME — rendered from supplied PNG illustrations rather than
    // the hand-drawn iso primitives. The .opt-glyph wrapper enforces 4:3
    // aspect ratio and overflow:hidden; img with object-fit:contain keeps
    // the artwork centered without cropping.
    const Studio = (
      <span className="opt-bitmap" role="img" aria-label="Küchenstudio"
            dangerouslySetInnerHTML={{ __html: window.STUDIO_SVG }} />
    );

    const Home = (
      <span className="opt-bitmap" role="img" aria-label="Zuhause"

    // ─────────────────────────── "other shape" icon ───────────────────────────
    // Question mark inside a circle, sitting in the same 4:3 viewBox as the
    // 2D budget/calendar glyphs. Stroke colour is #1A1D1B so the global
    // .opt-glyph rule recolours it to dark grey alongside the kitchen icons.
    const QuestionMark = (
      <svg viewBox="0 0 80 60" className="shape-svg"
           aria-label="Andere Form" preserveAspectRatio="xMidYMid meet">
        <circle cx="40" cy="30" r="20"
                fill="#FFFFFF" stroke="#1A1D1B" strokeWidth="0.9" />
        <text x="40" y="39"
              fontFamily="Inter, sans-serif" fontWeight="400"
              fontSize="24" textAnchor="middle" fill="#1A1D1B">?</text>
      </svg>
    );

    // ─────────────────────────── timing icons ───────────────────────────
    function CalendarIcon({ label }) {
      return (
        <svg viewBox="-4 -3 88 66" className="shape-svg" aria-label={label} preserveAspectRatio="xMidYMid meet">
          {/* page */}
          <rect x="17" y="10" width="46" height="42" rx="4"
                fill="#FFFFFF" stroke="#1A1D1B" strokeWidth="1.2" />
          {/* header strip */}
          <line x1="17" y1="20" x2="63" y2="20" stroke="#1A1D1B" strokeWidth="1.2" />
          {/* binding rings — vertical pills overlapping the top edge so they
              read as spiral-bound tabs poking out the top of the calendar */}
          <rect x="25.7" y="6" width="3.5" height="9" rx="1.75"
                fill="#FFFFFF" stroke="#1A1D1B" strokeWidth="1.1" />
          <rect x="50.8" y="6" width="3.5" height="9" rx="1.75"
                fill="#FFFFFF" stroke="#1A1D1B" strokeWidth="1.1" />
          {/* label */}
          <text x="40" y="40" fontFamily="Inter, sans-serif"
                fontWeight="600" fontSize="13" textAnchor="middle" fill="#1A1D1B">{label}</text>
        </svg>
      );

    // ─────────────────────────── budget icons ───────────────────────────
    // 3D coin cylinder = side wall path (vertical edges + bottom-front arc
    // for the visible front belly + hidden back-top arc to close the path)
    // overlaid with the top-face ellipse. Stacked with a small gap so each
    // coin's "lip" reads as a distinct rim.
    // Budget icons sourced from supplied SVGs (budget-1..budget-4). The
    // funnel has 5 budget bands and 4 illustrations, so the highest band
    // reuses the topmost (budget-4) icon.
    const BUDGET_SVGS = [
      window.BUDGET_SVG_1, window.BUDGET_SVG_2,
      window.BUDGET_SVG_3, window.BUDGET_SVG_4,
    ];
    function CoinIcon({ tier }) {
      const idx = Math.max(0, Math.min(BUDGET_SVGS.length - 1, tier - 1));
      return (
        <span className="opt-bitmap" role="img" aria-label="Budget"
              dangerouslySetInnerHTML={{ __html: BUDGET_SVGS[idx] }} />
      );
    }

    // ─────────────────────────── data ───────────────────────────
    const STEPS = [
      {
        id: "shape",
        title: "Welche Küchenform gefällt Ihnen?",
        subtitle: "Wählen Sie die Grundform, die zu Ihrem Raum passt.",
        type: "grid", cols: 3,
        options: [
          { id: "KITCHENETTE", label: "Küchenzeile", glyph: Shapes.KITCHENETTE },
          { id: "TWO_LINER",   label: "Zweizeiler",   glyph: Shapes.TWO_LINER },
          { id: "L_FORM",      label: "L-Form",       glyph: Shapes.L_FORM },
          { id: "U_FORM",      label: "U-Form",       glyph: Shapes.U_FORM },
          { id: "ISLAND",      label: "Kücheninsel",  glyph: Shapes.ISLAND },
          { id: "OTHER_SHAPE", label: "Andere Form / steht noch nicht fest", glyph: QuestionMark },
        ],
      },
      {
        id: "location",
        title: "Wo möchten Sie Ihren persönlichen Planungstermin machen?",
        subtitle: "Wir kommen zu Ihnen oder Sie besuchen uns vor Ort.",
        type: "grid", cols: 2,
        options: [
          { id: "STUDIO", label: "Im Küchenstudio", hint: "Persönliche Beratung vor Ort", glyph: Studio },
          { id: "HOME",   label: "Bei Ihnen Zuhause", hint: "Wir kommen zu Ihnen",         glyph: Home },
        ],
      },
      {
        id: "timing",
        title: "Wann brauchen Sie die neue Küche?",
        subtitle: "Wir planen den Liefertermin nach Ihrem Wunsch.",
        type: "grid", cols: 3,
        options: [
          { id: "T_1_3",   label: "1–3 Monate",  glyph: <CalendarIcon label="1-3" /> },
          { id: "T_4_6",   label: "4–6 Monate",  glyph: <CalendarIcon label="4-6" /> },
          { id: "T_7_12",  label: "7–12 Monate", glyph: <CalendarIcon label="7-12" /> },
          { id: "T_12P",   label: "12+ Monate",  glyph: <CalendarIcon label="12+" /> },
          { id: "T_OPEN",  label: "Steht noch nicht fest", glyph: QuestionMark },
        ],
      },
      {
        id: "budget",
        title: "Wie viel Budget steht für Ihren Küchentraum zur Verfügung?",
        subtitle: "Wir arbeiten ausschließlich mit deutschen Qualitäts-Herstellern zusammen.",
        type: "grid", cols: 3,
        options: [
          { id: "B_LT5",     label: "unter 5.000 €",        glyph: <CoinIcon tier={1} /> },
          { id: "B_5_10",    label: "5.000 € – 10.000 €",   glyph: <CoinIcon tier={2} /> },
          { id: "B_10_15",   label: "10.000 € – 15.000 €",  glyph: <CoinIcon tier={3} /> },
          { id: "B_15_20",   label: "15.000 € – 20.000 €",  glyph: <CoinIcon tier={4} /> },
          { id: "B_GT20",    label: "über 20.000 €",        glyph: <CoinIcon tier={5} /> },
        ],
      },
      {
        id: "contact",
        title: "Fast geschafft — wohin dürfen wir Ihren Vorschlag senden?",
        subtitle: "Damit wir Ihr individuelles Traumküchen-Angebot erstellen können, fehlen uns nur noch ein paar Informationen.",
        type: "form",
      },
    ];

    const BRANDS = ["AEG", "BORA", "Miele", "Mondo", "next125", "Vito", "NEFF"];

    const ANREDE = [
      { id: "Herr",    label: "Herr" },
      { id: "Frau",    label: "Frau" },
      { id: "Divers",  label: "Divers" },
      { id: "Familie", label: "Familie" },
    ];

    const COUNTRIES = [
      { code: "DE", dial: "+49", label: "🇩🇪 +49" },
      { code: "AT", dial: "+43", label: "🇦🇹 +43" },
      { code: "CH", dial: "+41", label: "🇨🇭 +41" },
      { code: "NL", dial: "+31", label: "🇳🇱 +31" },
      { code: "BE", dial: "+32", label: "🇧🇪 +32" },
      { code: "FR", dial: "+33", label: "🇫🇷 +33" },
      { code: "IT", dial: "+39", label: "🇮🇹 +39" },

    // ─────────────────────────── App ───────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [answers, setAnswers] = useState({});
      const [submitted, setSubmitted] = useState(false);
      const [contact, setContact] = useState({ anrede: "Herr", name: "", email: "", phoneCountry: "DE", phone: "", plz: "" });
      const [touched, setTouched] = useState({});

      useEffect(() => {
        document.documentElement.style.setProperty("--accent", "oklch(58% 0.07 150)");
        document.documentElement.style.setProperty("--accent-soft", "oklch(95% 0.02 150)");
      }, []);

      const step = STEPS[stepIdx];
      const total = STEPS.length;
      const progress = ((stepIdx + (submitted ? 1 : 0)) / total) * 100;

      const errs = useMemo(() => ({
        name: contact.name.trim().length < 2 ? "Bitte Vor- und Nachname angeben" : null,
        email: !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(contact.email) ? "Bitte gültige E-Mail-Adresse" : null,
        phone: contact.phone.replace(/\D/g, "").length < 6 ? "Bitte Telefonnummer" : null,
        plz: !/^\d{4,5}$/.test(contact.plz) ? "Bitte gültige PLZ" : null,
      }), [contact]);

      const formValid = !errs.name && !errs.email && !errs.phone && !errs.plz;

      function pick(stepId, value) {
        setAnswers((a) => ({ ...a, [stepId]: value }));
        if (STEPS.find(s => s.id === stepId).type !== "form") {
          setTimeout(() => setStepIdx((i) => Math.min(i + 1, total - 1)), 320);
        }
      }
      function back() { setStepIdx((i) => Math.max(0, i - 1)); }
      function submit() {
        setTouched({ name: true, email: true, phone: true, plz: true });
        if (formValid) setSubmitted(true);
      }

      return (
        <div className="page">
          <div className="card">
            <ReviewBar />
            <div className="card-body">
              <Nav stepIdx={stepIdx} total={total} onBack={back} submitted={submitted} />
              <Progress value={progress} />
              {!submitted ? (
                <div className="step-content" key={stepIdx}>
                  <Header title={step.title} subtitle={step.subtitle} />
                  {step.type === "grid" && (
                    <GridStep step={step} selected={answers[step.id]} onPick={(v) => pick(step.id, v)} />
                  )}
                  {step.type === "form" && (
                    <FormStep
                      contact={contact} setContact={setContact}
                      touched={touched} setTouched={setTouched}
                      errs={errs} formValid={formValid} onSubmit={submit}
                    />
                  )}
                </div>
              ) : (
                <Success answers={answers} contact={contact} />
              )}
            </div>
            <BrandStrip />
            <Reassurance />
          </div>
        </div>
      );
    }

    // ─────────────────────────── components ───────────────────────────
    function ReviewBar() {
      return (
        <div className="review-bar">
          <div className="review-bar-inner">
            <div className="review-cluster">
              <div className="review-rating">
                <strong>4,3</strong>
                <Stars rating={4.3} />
              </div>
              <span className="review-divider" aria-hidden="true" />
              <div className="review-source">
                <GoogleG />
                <span className="review-source-text">1.195+ Google-Bewertungen</span>
              </div>
            </div>
            <div className="review-trust"><Dot /> Kostenlos & unverbindlich</div>
          </div>
        </div>
      );
    }
    function GoogleG() {
      return (
        <svg width="14" height="14" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
      );
    }
    function Stars({ rating }) {
      return (
        <span className="stars" aria-label={`${rating} von 5`}>
          {[0,1,2,3,4].map(i => {
            const fill = Math.max(0, Math.min(1, rating - i));
            return (
              <svg key={i} width="14" height="14" viewBox="0 0 20 20" aria-hidden="true">
                <defs>
                  <linearGradient id={`s-${i}-${rating}`}>
                    <stop offset={`${fill*100}%`} stopColor="currentColor" />
                    <stop offset={`${fill*100}%`} stopColor="currentColor" stopOpacity="0.25" />
                  </linearGradient>
                </defs>
                <path fill={`url(#s-${i}-${rating})`} d="M10 1.5l2.6 5.3 5.9.85-4.25 4.15 1 5.85L10 14.9l-5.25 2.75 1-5.85L1.5 7.65l5.9-.85L10 1.5z"/>
              </svg>
            );
          })}
        </span>
      );
    }
    const Dot = () => <span className="status-dot" aria-hidden="true" />;

    function Nav({ stepIdx, total, onBack, submitted }) {
      return (
        <div className="nav">
          <button className="back-btn" onClick={onBack} disabled={stepIdx === 0 || submitted} aria-label="Zurück">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M13 8H3M7 4L3 8l4 4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
            <span>Zurück</span>
          </button>
          <div className="brand">
            <img src={LOGO_URI} alt="biller küchen" />
          </div>
          <div className="step-counter">
            <span className="step-num">{submitted ? total : stepIdx + 1}</span>
            <span className="step-sep">/</span>
            <span className="step-tot">{total}</span>
          </div>
        </div>
      );
    }
    function BrandMark() {
      return (
        <svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
          <rect x="2" y="2" width="18" height="18" rx="4" fill="var(--accent)" />
          <path d="M7 14V8h2.5l1.5 4 1.5-4H15v6" stroke="white" strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );
    }

    function Progress({ value }) {
      return (
        <div className="progress">
          <span className="progress-track" />
          <span className="progress-fill" style={{ width: `${value}%` }} />
        </div>
      );
    }
    function Header({ title, subtitle }) {
      return (
        <div className="header">
          <h1 className="title">{title}</h1>
          {subtitle && <p className="subtitle">{subtitle}</p>}
        </div>
      );
    }

    function GridStep({ step, selected, onPick }) {
      return (
        <>
          <div className={`grid grid-cols-${step.cols}`} style={{"--cols": step.cols}}>
            {step.options.map((opt) => (
              <Card
                key={opt.id}
                selected={selected === opt.id}
                onSelect={() => onPick(opt.id)}
                label={opt.label} hint={opt.hint} glyph={opt.glyph}
              />
            ))}
          </div>
          {step.fallback && (
            <button
              type="button"
              className={`fallback ${selected === step.fallback.id ? "is-selected" : ""}`}
              onClick={() => onPick(step.fallback.id)}
            >
              <Plus /> {step.fallback.label}
            </button>
          )}
        </>
      );
    }
    function Plus() {
      return (
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M7 2v10M2 7h10" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" />
        </svg>
      );
    }
    function Card({ selected, onSelect, label, hint, glyph }) {
      return (
        <button
          type="button"
          className={`opt-card ${selected ? "is-selected" : ""}`}
          onClick={onSelect}
          aria-pressed={selected}

          <span className="opt-check" aria-hidden="true">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2.5 6.5l2.2 2.2L9.5 3.8" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </span>
          <span className="opt-glyph">{glyph}</span>
          <span className="opt-meta">
            <span className="opt-label">{label}</span>
            {hint && <span className="opt-hint">{hint}</span>}
          </span>
        </button>
      );

    function FormStep({ contact, setContact, touched, setTouched, errs, formValid, onSubmit }) {
      const set = (k, v) => setContact((c) => ({ ...c, [k]: v }));
      const blur = (k) => setTouched((t) => ({ ...t, [k]: true }));
      const showErr = (k) => touched[k] && errs[k];
      return (
        <div className="form-step">
          {/* Anrede */}
          <div className="anrede" role="radiogroup" aria-label="Anrede">
            {ANREDE.map(a => (
              <button
                key={a.id} type="button" role="radio"
                aria-checked={contact.anrede === a.id}
                className={`anrede-opt ${contact.anrede === a.id ? "is-selected" : ""}`}
                onClick={() => set("anrede", a.id)}
              >{a.label}</button>
            ))}
          </div>

          <div className="form-grid">
            <label className={`field ${showErr("name") ? "has-error" : ""}`}>
              <span className="field-label">Vorname & Nachname*</span>
              <input className="input" type="text" autoComplete="name"
                value={contact.name} onChange={(e) => set("name", e.target.value)} onBlur={() => blur("name")}
                placeholder="Anna Müller" />
              {showErr("name") && <span className="field-err">{errs.name}</span>}
            </label>

            <label className={`field ${showErr("email") ? "has-error" : ""}`}>
              <span className="field-label">E-Mail-Adresse*</span>
              <input className="input" type="email" autoComplete="email"
                value={contact.email} onChange={(e) => set("email", e.target.value)} onBlur={() => blur("email")}
                placeholder="anna@beispiel.de" />
              {showErr("email") && <span className="field-err">{errs.email}</span>}
            </label>

            <label className={`field ${showErr("phone") ? "has-error" : ""}`}>
              <span className="field-label">Telefonnummer*</span>
              <div className="phone-row">
                <select className="phone-country" value={contact.phoneCountry}
                  onChange={(e) => set("phoneCountry", e.target.value)}>
                  {COUNTRIES.map(c => <option key={c.code} value={c.code}>{c.label}</option>)}
                </select>
                <input className="input" type="tel" autoComplete="tel"
                  value={contact.phone} onChange={(e) => set("phone", e.target.value)} onBlur={() => blur("phone")}
                  placeholder="151 234 5678" />
              </div>
              {showErr("phone") && <span className="field-err">{errs.phone}</span>}
            </label>

            <label className={`field ${showErr("plz") ? "has-error" : ""}`}>
              <span className="field-label">Postleitzahl*</span>
              <input className="input" type="text" autoComplete="postal-code" inputMode="numeric"
                value={contact.plz} onChange={(e) => set("plz", e.target.value)} onBlur={() => blur("plz")}

    function Lock({ small }) {

        </svg>

    function Success({ answers, contact }) {
      return (
        <div className="success">
          <div className="success-icon">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="19" stroke="var(--accent)" strokeWidth="1.5" />

          </div>
          <h2 className="success-title">Vielen Dank, {contact.name.split(" ")[0] || "Sie"}!</h2>

          <div className="success-summary">

            <div><span>Termin</span><strong>{labelOf("location", answers.location) || "—"}</strong></div>
            <div><span>Zeitraum</span><strong>{labelOf("timing", answers.timing) || "—"}</strong></div>
            <div><span>Budget</span><strong>{labelOf("budget", answers.budget) || "—"}</strong></div>
          </div>
        </div>
      );

    function labelOf(stepId, valueId) {
      const step = STEPS.find(s => s.id === stepId);
      if (!step?.options) return null;
      const opt = step.options.find(o => o.id === valueId) || (step.fallback?.id === valueId ? step.fallback : null);
      return opt?.label || null;

    function Reassurance() {
      const items = [

        { t: "Unverbindlich",  s: "Kein Kaufzwang, jederzeit kündbar" },

        <div className="reassure">

            <div key={idx} className="reassure-item">
              <span className="reassure-icon"><Check /></span>
              <div>
                <div className="reassure-t">{i.t}</div>
                <div className="reassure-s">{i.s}</div>
              </div>
            </div>
          ))}
        </div>
      );
    }
    function Check() {
      return (
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M4.5 9.2l3 3 6-7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );
    }

    function BrandStrip() {
      return (
        <div className="brand-strip">
          <span className="brand-strip-label">Wir planen mit</span>
          <div className="brand-list">
            {BRANDS.map(b => <span key={b} className="brand-item">{b}</span>)}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
